<h2>💰 Add Tithe</h2>

<form method="POST">
    {% csrf_token %}

    <select name="member">
        {% for m in members %}
            <option value="{{ m.id }}">{{ m.first_name }} {{ m.last_name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <input type="number" name="amount" placeholder="Amount">

    <br><br>

    <button type="submit">Save Tithe</button>
</form>

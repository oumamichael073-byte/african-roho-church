{% extends "members/base.html" %}

{% block content %}

<h2>📋 Attendance Records</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Member</th>
        <th>Status</th>
        <th>Date</th>
    </tr>

    {% for r in records %}
    <tr>
        <td>{{ r.member.first_name }} {{ r.member.last_name }}</td>
        <td>{{ r.status }}</td>
        <td>{{ r.date }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No attendance yet</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}

{% extends "members/base.html" %}

{% block content %}

<h2>📊 Attendance Report</h2>

<div class="cards">

    <div class="card">
        <h3>Weekly Attendance</h3>
        <p>{{ weekly_attendance }}</p>
    </div>

    <div class="card">
        <h3>Monthly Attendance</h3>
        <p>{{ monthly_attendance }}</p>
    </div>

    <div class="card">
        <h3>Total Attendance</h3>
        <p>{{ total_attendance }}</p>
    </div>

</div>

{% endblock %}

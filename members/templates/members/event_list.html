{% extends "members/base.html" %}

{% block content %}

<h2>📅 Upcoming Church Events</h2>

<p>
    <a href="{% url 'add_event' %}">
        ➕ Add New Event
    </a>
</p>

<table border="1" cellpadding="10" style="width:100%;">
    <tr>
        <th>Title</th>
        <th>Date</th>
        <th>Location</th>
    </tr>

    {% for event in events %}
    <tr>
        <td>{{ event.title }}</td>
        <td>{{ event.event_date }}</td>
        <td>{{ event.location }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">
            No upcoming events found.
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}

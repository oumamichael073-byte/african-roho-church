<h2>👥 Church Leadership</h2>

<a href="{% url 'add_leader' %}">
    Add Leader
</a>

<hr>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Phone</th>
    </tr>

    {% for leader in leaders %}
    <tr>
        <td>{{ leader.name }}</td>
        <td>{{ leader.get_role_display }}</td>
        <td>{{ leader.phone }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No leaders added yet.</td>
    </tr>
    {% endfor %}
</table>
